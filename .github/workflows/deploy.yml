name: Deploy to Cloud Run

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  PROJECT_ID: nexvigilant-digital-clubhouse
  REGION: us-central1
  SERVICE: nexvigilant-station
  REGISTRY: us-central1-docker.pkg.dev/nexvigilant-digital-clubhouse/station

jobs:
  deploy:
    name: Deploy Station (Canary)
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet

      - name: Build and push Docker image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${REGISTRY}/${SERVICE}:${SHORT_SHA}"
          LATEST="${REGISTRY}/${SERVICE}:latest"
          # Pull latest for layer cache (best-effort — first build won't have it)
          docker pull "$LATEST" 2>/dev/null || true
          docker build \
            --build-arg "GIT_SHA=${SHORT_SHA}" \
            --cache-from "$LATEST" \
            -t "$IMAGE" \
            -t "$LATEST" \
            .
          docker push "$IMAGE"
          docker push "$LATEST"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Deploy new revision (no traffic)
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --allow-unauthenticated \
            --no-traffic \
            --quiet

      - name: Get new revision name
        id: revision
        run: |
          NEW_REV=$(gcloud run revisions list \
            --service="$SERVICE" \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --sort-by="~creationTimestamp" \
            --limit=1 \
            --format="value(metadata.name)")
          echo "name=$NEW_REV" >> "$GITHUB_OUTPUT"
          echo "New revision: $NEW_REV"

      - name: Canary — route 10% traffic
        run: |
          gcloud run services update-traffic "$SERVICE" \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --to-revisions="${{ steps.revision.outputs.name }}=10"

      - name: Smoke test canary
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sleep 15
          for i in 1 2 3 4 5; do
            HEALTH=$(curl -sf -m 15 https://mcp.nexvigilant.com/health)
            STATUS=$(echo "$HEALTH" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")
            GIT_SHA=$(echo "$HEALTH" | python3 -c "import sys,json; print(json.load(sys.stdin).get('git_sha','unknown'))")
            echo "Attempt $i — Status: $STATUS, SHA: $GIT_SHA (expected: $SHORT_SHA)"
            if [ "$STATUS" != "ok" ]; then
              echo "CANARY SMOKE TEST FAILED — rolling back"
              gcloud run services update-traffic "$SERVICE" \
                --project="$PROJECT_ID" \
                --region="$REGION" \
                --to-revisions="${{ steps.revision.outputs.name }}=0"
              exit 1
            fi
            sleep 2
          done
          TOOLS=$(curl -sf -m 15 https://mcp.nexvigilant.com/tools | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "Tools: $TOOLS"
          echo "Canary healthy at 10% — promoting"

      - name: Promote — route 100% traffic
        run: |
          gcloud run services update-traffic "$SERVICE" \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --to-revisions="${{ steps.revision.outputs.name }}=100"
          echo "Deployed ${{ steps.revision.outputs.name }} at 100%"
