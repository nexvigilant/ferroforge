name: literature-review
description: Drug+Event → PubMed signal literature → case reports → WHO methodology

hops:
  - tool: pubmed_ncbi_nlm_nih_gov_search_signal_literature
    args:
      drug_name: "$drug"
    extract:
      signal_articles: "count"

  - tool: pubmed_ncbi_nlm_nih_gov_search_case_reports
    args:
      drug_name: "$drug"
      adverse_event: "$event"
    extract:
      case_reports: "count"

  - tool: who-umc_org_get_causality_assessment
    args: {}
    extract:
      who_categories: "status"
