name: drug-profile
description: Drug → RxNav identity → DailyMed label → FAERS top reactions → DrugBank info

hops:
  - tool: rxnav_nlm_nih_gov_search_drugs
    args: { query: "$drug" }
    extract: { rxcui: "results[0].rxcui" }

  - tool: dailymed_nlm_nih_gov_search_drugs
    args: { query: "$drug" }
    extract: { label_count: "count" }
    continue_on_error: true

  - tool: api_fda_gov_search_adverse_events
    args: { drug_name: "$drug", serious: true, limit: 3 }
    extract: { faers_total: "total_matching" }

  - tool: go_drugbank_com_get_drug_info
    args: { drug_name: "$drug" }
    extract: { drugbank_status: "status" }
    continue_on_error: true
