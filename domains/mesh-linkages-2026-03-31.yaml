# Mesh linkages — 2026-03-31
# Lateral (peer-to-peer) and horizontal (cross-tier) connectivity

configs:
  - domain: "multiregional.nexvigilant.com"
    title: "Multi-Regional PV Safety Assessment"
    description: "Fan-out safety queries across 11 national PV agencies simultaneously. Lateral linkage: peer regulatory agencies cross-referenced. Horizontal linkage: regulatory actions mapped to labeling, literature, and signal data."
    proxy: true
    tools:
      - "assess-global-safety(drug_name, event?:str): Fan-out safety assessment across all 11 regulatory agencies — FDA, EMA, Health Canada, PMDA, TGA, MHRA, Swissmedic, HSA, Medsafe, ANVISA, COFEPRIS. Returns per-agency findings with concordance."
      - "compare-regulatory-actions(drug_name): Compare regulatory actions taken across jurisdictions — recalls, safety communications, labeling changes, RMPs. Identifies divergent regulatory responses."
      - "map-signal-propagation(drug_name, event:str): Track how a safety signal propagated across jurisdictions chronologically. First detection → subsequent regulatory actions → global convergence timeline."
      - "get-regional-coverage(drug_name): Check which of the 11 regulatory agencies have data for a drug. Returns coverage map with data types available per agency."
      - "compute-global-concordance(drug_name, event:str): Compute cross-jurisdictional concordance score for a drug-event signal. Weights: FAERS(0.25), EudraVigilance(0.20), VigiAccess(0.15), PMDA(0.10), Health Canada(0.10), MHRA(0.08), TGA(0.05), others(0.07)."

  - domain: "regulatory-mesh.nexvigilant.com"
    title: "Regulatory Agency Cross-Reference Mesh"
    description: "Lateral linkages between regulatory agencies. Maps equivalent actions, terminology, and classification systems across jurisdictions."
    proxy: true
    tools:
      - "map-equivalent-actions(action_type:str, source_agency:str): Map a regulatory action type to equivalent actions in other agencies. E.g., FDA 'boxed warning' = EMA 'contraindication' = PMDA 'red frame warning' = TGA 'black box'."
      - "translate-terminology(term:str, from_agency:str, to_agency:str): Translate PV terminology between agency frameworks. E.g., CIOMS seriousness criteria across FDA/EMA/PMDA interpretations."
      - "get-reporting-requirements(drug_name, event_type:str): Compare expedited reporting timelines across agencies — 15-day (FDA), 15-day (EMA), 15-day (PMDA) for fatal/life-threatening, vs 90-day periodic."
      - "compare-classification-systems(system:str): Compare how agencies classify the same concept — seriousness criteria, causality assessment methods, expectedness definitions."
      - "get-mutual-recognition(drug_name): Identify mutual recognition or reliance pathways between agencies for a drug — FDA-EMA parallel review, WHO prequalification, ICH harmonized submissions."
      - "map-safety-database-coverage: Show which databases each agency maintains, reporting volumes, and data accessibility. Static reference enriched with live tool availability."
