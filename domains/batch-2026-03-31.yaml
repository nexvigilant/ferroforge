# Batch forge — 2026-03-31
# Global PV regulatory agencies + safety data sources
# Port Authority: CONFIG LAND GRAB for PV vertical

configs:
  - domain: "recalls-rappels.canada.ca"
    title: "Health Canada Drug Safety"
    description: "Canadian drug recalls, safety reviews, adverse reaction database, and risk communications from Health Canada"
    base_url: "https://health-products.canada.ca/api"
    proxy: true
    tools:
      - "search-recalls(drug_name, limit?:int=25): Search Health Canada drug and health product recalls"
      - "get-safety-reviews(drug_name): Get summary safety reviews (SSRs) for a drug"
      - "search-adverse-reactions(drug_name, reaction?:str, limit?:int=25): Search Canada Vigilance adverse reaction reports"
      - "get-risk-communications(drug_name): Get health professional risk communications and public advisories"
      - "get-drug-product-database(drug_name): Search the Drug Product Database for Canadian market authorizations"
      - "get-natural-health-products(query): Search licensed natural health products"
      - "get-clinical-trial-database(drug_name): Search Canadian clinical trial registry"

  - domain: "www.pmda.go.jp"
    title: "PMDA Japan Pharmaceuticals"
    description: "Japanese Pharmaceuticals and Medical Devices Agency — adverse drug reaction reports, safety information, and drug approvals"
    base_url: "https://www.pmda.go.jp"
    proxy: true
    tools:
      - "search-safety-information(drug_name): Search PMDA safety communications and Dear Healthcare Professional letters"
      - "get-adverse-reactions(drug_name, limit?:int=25): Search Japanese adverse drug reaction case reports"
      - "get-drug-approval(drug_name): Get Japanese drug approval information including review reports"
      - "get-rmp-summary(drug_name): Get Risk Management Plan summary for a Japanese-approved drug"
      - "get-reevaluation-results(drug_name): Get post-marketing re-evaluation results"
      - "search-relief-cases(drug_name): Search PMDA adverse drug reaction relief system cases"

  - domain: "www.tga.gov.au"
    title: "TGA Australia Drug Safety"
    description: "Australian Therapeutic Goods Administration — adverse event notifications (DAEN), safety alerts, and product information"
    base_url: "https://www.tga.gov.au"
    proxy: true
    tools:
      - "search-daen-reports(drug_name, reaction?:str, limit?:int=25): Search Database of Adverse Event Notifications (DAEN)"
      - "get-safety-alerts(drug_name): Get TGA safety advisory and alert communications"
      - "get-product-information(drug_name): Get approved product information (Australian PI)"
      - "get-adr-reports(drug_name): Get aggregated adverse drug reaction reports by SOC"
      - "search-artg(drug_name): Search Australian Register of Therapeutic Goods"
      - "get-recalls(drug_name): Get TGA product recall and safety notifications"

  - domain: "www.gov.uk"
    title: "MHRA UK Drug Safety"
    description: "UK Medicines and Healthcare products Regulatory Agency — Yellow Card adverse reaction reports, safety updates, and drug alerts"
    base_url: "https://www.gov.uk"
    proxy: true
    tools:
      - "search-yellow-card-reports(drug_name, reaction?:str): Search MHRA Yellow Card adverse reaction reports"
      - "get-drug-safety-updates(drug_name): Get Drug Safety Update bulletin articles for a drug"
      - "get-safety-alerts(drug_name): Get MHRA medical device and drug safety alerts"
      - "get-par-summary(drug_name): Get Public Assessment Report summary for a UK-approved drug"
      - "search-cprd-signals(drug_name): Search Clinical Practice Research Datalink signal findings"
      - "get-black-triangle-status(drug_name): Check Black Triangle (intensive monitoring) status"
      - "get-rmp-uk(drug_name): Get UK Risk Management Plan details"

  - domain: "www.swissmedic.ch"
    title: "Swissmedic Switzerland"
    description: "Swiss Agency for Therapeutic Products — drug safety signals, authorization decisions, and vigilance reports"
    base_url: "https://www.swissmedic.ch"
    proxy: true
    tools:
      - "search-safety-signals(drug_name): Search Swissmedic pharmacovigilance safety signals"
      - "get-authorization-info(drug_name): Get Swiss drug authorization details"
      - "get-dhpc-letters(drug_name): Get Direct Healthcare Professional Communications"
      - "get-periodic-safety-updates(drug_name): Get PSUR assessment outcomes for Swiss market"
      - "search-vigilance-reports(drug_name, reaction?:str): Search individual case safety reports filed in Switzerland"

  - domain: "www.hsa.gov.sg"
    title: "HSA Singapore Drug Safety"
    description: "Singapore Health Sciences Authority — adverse drug reaction reports, safety alerts, and product registration"
    base_url: "https://www.hsa.gov.sg"
    proxy: true
    tools:
      - "search-adverse-reactions(drug_name, limit?:int=25): Search Singapore ADR database"
      - "get-safety-alerts(drug_name): Get HSA safety alerts and Dear Healthcare Professional letters"
      - "get-product-registration(drug_name): Get Singapore drug registration information"
      - "get-therapeutic-product-recalls(drug_name): Get product recall information"

  - domain: "www.medsafe.govt.nz"
    title: "Medsafe New Zealand"
    description: "New Zealand Medicines and Medical Devices Safety Authority — adverse reaction reports, prescriber updates, and data sheets"
    base_url: "https://www.medsafe.govt.nz"
    proxy: true
    tools:
      - "search-adverse-reactions(drug_name): Search CARM adverse reaction reports (Centre for Adverse Reactions Monitoring)"
      - "get-prescriber-update(drug_name): Get Prescriber Update bulletin safety articles"
      - "get-data-sheet(drug_name): Get approved New Zealand data sheet for a medicine"
      - "get-safety-communications(drug_name): Get Medsafe safety communications and alerts"

  - domain: "ctdbase.org"
    title: "Comparative Toxicogenomics Database"
    description: "CTD — curated chemical-gene-disease interactions, toxicogenomic pathways, and exposure-outcome associations"
    base_url: "https://ctdbase.org"
    proxy: true
    tools:
      - "search-chemical-gene(drug_name, gene?:str): Search chemical-gene/protein interactions"
      - "get-chemical-diseases(drug_name): Get diseases associated with a chemical via curated evidence"
      - "search-chemical-pathways(drug_name): Get biological pathways affected by a chemical"
      - "get-gene-disease(gene): Get disease associations for a gene"
      - "get-exposure-outcomes(chemical): Get exposure-disease-outcome associations from epidemiological studies"
      - "search-phenotypes(drug_name): Get GO-enriched phenotypes associated with chemical exposure"
