# Batch forge — 2026-03-29
# High-value free PV APIs missing from station

configs:
  - domain: "www.ebi.ac.uk"
    title: "ChEMBL Bioactivity Database"
    description: "Drug bioactivity data, targets, mechanisms of action, and assay results from ChEMBL at EMBL-EBI"
    base_url: "https://www.ebi.ac.uk/chembl/api/data"
    proxy: true
    tools:
      - "search-compounds(query): Search ChEMBL for compounds by name, synonym, or identifier"
      - "get-compound(chembl_id): Get compound details including structure, properties, and clinical phase"
      - "get-compound-bioactivities(chembl_id, limit?:int=25): Get bioactivity measurements (IC50, EC50, Ki) for a compound"
      - "get-drug-mechanisms(chembl_id): Get mechanism of action and target information for a drug"
      - "search-targets(query): Search drug targets by name, gene symbol, or organism"
      - "get-target(chembl_id): Get target details including classification and associated compounds"
      - "get-drug-indications(chembl_id): Get approved and investigational indications for a drug"

  - domain: "platform-api.opentargets.org"
    title: "Open Targets Platform"
    description: "Target-disease associations, drug evidence, and genetic links from Open Targets"
    base_url: "https://api.platform.opentargets.org/api/v4"
    proxy: true
    tools:
      - "search-targets(query): Search for drug targets by gene name or protein"
      - "search-diseases(query): Search diseases by name or EFO identifier"
      - "get-associations(target_id, limit?:int=25): Get disease associations for a target with evidence scores"
      - "get-drug-evidence(target_id, disease_id): Get drug evidence linking a target to a disease"
      - "get-target-safety(target_id): Get known safety effects and toxicity for a target"
      - "get-pharmacogenomics(target_id): Get pharmacogenomics evidence for a target"

  - domain: "rest.uniprot.org"
    title: "UniProt Protein Knowledge Base"
    description: "Protein sequence, function, variants, and disease associations from UniProt"
    base_url: "https://rest.uniprot.org"
    proxy: true
    tools:
      - "search-proteins(query): Search UniProt for proteins by name, gene, or organism"
      - "get-protein(accession): Get full protein entry with function, subcellular location, and GO terms"
      - "get-protein-variants(accession): Get known sequence variants and disease associations"
      - "get-protein-interactions(accession): Get protein-protein interactions"
      - "get-protein-disease(accession): Get disease involvement for a protein"
      - "get-protein-pharmacology(accession): Get pharmacological data — drug binding sites and ligands"

  - domain: "reactome.org"
    title: "Reactome Biological Pathways"
    description: "Curated biological pathway and reaction data from Reactome"
    base_url: "https://reactome.org/ContentService"
    proxy: true
    tools:
      - "search-pathways(query): Search pathways by name, gene, or keyword"
      - "get-pathway(pathway_id): Get pathway details by stable identifier"
      - "get-pathway-participants(pathway_id): Get molecular participants in a pathway"
      - "get-disease-pathways(disease): Get pathways associated with a disease"
      - "search-reactions(query): Search reactions by name or identifier"
      - "get-drug-pathway-targets(drug_name): Find pathways containing known drug targets"

  - domain: "api.pharmgkb.org"
    title: "PharmGKB Pharmacogenomics"
    description: "Pharmacogenomics knowledge — gene-drug-disease relationships, dosing guidelines, and variant annotations from PharmGKB"
    base_url: "https://api.pharmgkb.org/v1/data"
    proxy: true
    tools:
      - "search-drugs(query): Search PharmGKB drug entries"
      - "get-drug-labels(drug_name): Get FDA pharmacogenomic labeling for a drug"
      - "get-drug-genes(drug_name): Get genes associated with drug response"
      - "get-clinical-annotations(gene, drug_name?): Get clinical annotations for gene-drug pairs"
      - "get-dosing-guidelines(drug_name): Get CPIC/DPWG dosing guidelines for a drug"
      - "search-variants(query): Search pharmacogenomic variants by rsID or gene"
      - "get-variant-annotations(variant_id): Get clinical significance of a pharmacogenomic variant"
