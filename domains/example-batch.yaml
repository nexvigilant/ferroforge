# Example batch spec — demonstrates forge.py from-spec workflow
# Run: python3 scripts/forge.py from-spec domains/example-batch.yaml

configs:
  - domain: "uniprot.org"
    title: "UniProt Protein Database"
    description: "Protein sequences, function, and cross-references from UniProt"
    base_url: "https://rest.uniprot.org"
    proxy: true
    tools:
      - "search-proteins(query): Search UniProt for proteins by name, gene, or organism"
      - "get-protein-entry(accession): Get full protein entry by UniProt accession"
      - "get-protein-function(accession): Get protein function and GO annotations"
      - "get-protein-interactions(accession): Get known protein-protein interactions"
      - "get-protein-variants(accession, limit?:int=50): Get known sequence variants and disease associations"
      - "get-protein-cross-references(accession): Get cross-references to PDB, RefSeq, Ensembl"

  - domain: "reactome.org"
    title: "Reactome Pathway Database"
    description: "Biological pathway and reaction data from Reactome"
    base_url: "https://reactome.org/ContentService"
    proxy: true
    tools:
      - "search-pathways(query): Search pathways by name or keyword"
      - "get-pathway(pathway_id): Get pathway details by stable identifier"
      - "get-pathway-participants(pathway_id): Get genes and molecules in a pathway"
      - "get-pathway-diagram(pathway_id): Get pathway diagram data"
      - "get-disease-pathways(disease): Get pathways associated with a disease"
      - "search-reactions(query): Search reactions by name"
